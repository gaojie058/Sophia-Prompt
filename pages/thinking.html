<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 Thinking — SophiaPrompt</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#fff;--surface:#f8f9fa;--border:#e0e0e6;--text:#1a1a2e;--text-dim:#555570;--text-muted:#888899;--accent:#059669;--font-mono:'IBM Plex Mono',monospace;--font-sans:'IBM Plex Sans',sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:var(--font-sans);line-height:1.7}
  .header{border-bottom:1px solid var(--border);padding:1.2rem 2rem;display:flex;align-items:center;gap:1rem}
  .back{text-decoration:none;color:var(--text-muted);font-size:1.2rem}.back:hover{color:var(--accent)}
  .logo{font-family:var(--font-mono);font-size:1rem;font-weight:600;color:var(--text)}.logo span{color:var(--accent)}
  .breadcrumb{font-family:var(--font-mono);font-size:.8rem;color:var(--text-muted)}
  .container{max-width:820px;margin:0 auto;padding:2rem}
  .page-title{font-size:1.8rem;font-weight:600;margin-bottom:.3rem}
  .page-subtitle{color:var(--text-dim);font-size:.9rem;margin-bottom:2rem}
  .empty{text-align:center;padding:4rem 2rem;color:var(--text-muted);font-family:var(--font-mono);font-size:.85rem;border:1px dashed var(--border);border-radius:10px}
  .empty::before{content:"✨";display:block;font-size:2rem;margin-bottom:1rem}
  .footer{border-top:1px solid var(--border);padding:1.5rem 2rem;text-align:center;font-size:.75rem;color:var(--text-muted);font-family:var(--font-mono);margin-top:2rem}.footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="header">
  <a href="../index.html" class="back">←</a>
  <div class="logo">Sophia<span>Prompt</span></div>
  <div class="breadcrumb">/ thinking</div>
</div>
<div class="container">
  <div class="page-title">🧠 Thinking</div>
  <div class="page-subtitle">Problem solving, brainstorming, critical analysis, decision making</div>
  <div class="empty">No prompts yet — this collection is growing!</div>
</div>
<div class="footer">Built with 💜 by Sophia · <a href="../index.html">← Back to Home</a> · <a href="https://github.com/gaojie058/Sophia-Prompt">GitHub</a></div>
</body>
</html>
